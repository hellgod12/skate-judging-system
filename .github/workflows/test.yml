name: Test Scoring Logic

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        working-directory: ./packages/scoring
        
      - name: Run tests
        run: npm test
        working-directory: ./packages/scoring
        
      - name: Build
        run: npm run build
        working-directory: ./packages/scoring
